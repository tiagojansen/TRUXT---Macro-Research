<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRUXT Macro Research</title>
  <style>
    /* ── Truxt palette ───────────────────────────────────────────────────── */
    [data-theme="dark"] {
      --bg:#1a1718; --surface:#252122; --surface2:#2e2b2c; --border:#3a3637;
      --accent:#00a3b4; --brand:#003d68; --text:#f0eeef; --text2:#9a9496;
      --green:#83a540; --red:#c9484c; --amber:#eea320; --purple:#8b72cc;
      --shadow:rgba(0,0,0,.4); --logo-filter:brightness(0) invert(1);
    }
    [data-theme="light"] {
      --bg:#f0f2f5; --surface:#fff; --surface2:#e8ebf0; --border:#d0d5de;
      --accent:#003d68; --brand:#00a3b4; --text:#231f20; --text2:#5e5a5b;
      --green:#5c7a2c; --red:#a31418; --amber:#c47d0a; --purple:#583f99;
      --shadow:rgba(0,0,0,.08); --logo-filter:none;
    }
    :root { --radius:10px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; transition:background .2s,color .2s; }

    /* ── Auth ───────────────────────────────────────────────────────────── */
    #auth-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:1000; align-items:center; justify-content:center; }
    .auth-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:2rem; width:min(360px,90vw); text-align:center; box-shadow:0 8px 32px var(--shadow); }
    .auth-logo-img { height:40px; margin-bottom:1.25rem; filter:var(--logo-filter); }
    .auth-box h2 { font-size:1.1rem; margin-bottom:.35rem; }
    .auth-box p  { color:var(--text2); font-size:.83rem; margin-bottom:1.5rem; }
    .auth-box input[type=password] { width:100%; padding:.75rem 1rem; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-size:1rem; margin-bottom:.75rem; outline:none; transition:border-color .15s; }
    .auth-box input[type=password]:focus { border-color:var(--accent); }
    .btn-primary { width:100%; padding:.75rem; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-size:.95rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
    .btn-primary:hover { opacity:.88; }
    #auth-error { color:var(--red); font-size:.82rem; margin-top:.6rem; display:none; }

    /* ── Shell ──────────────────────────────────────────────────────────── */
    #app { display:none; }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 1rem; position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; height:52px; box-shadow:0 1px 4px var(--shadow); }
    .header-logo { height:28px; filter:var(--logo-filter); }
    .header-right { display:flex; align-items:center; gap:.75rem; }
    #header-date { font-size:.72rem; color:var(--text2); }
    .theme-btn { background:var(--surface2); border:1px solid var(--border); border-radius:99px; width:36px; height:20px; cursor:pointer; position:relative; flex-shrink:0; display:flex; align-items:center; padding:2px; }
    .theme-btn::after { content:""; width:14px; height:14px; border-radius:50%; background:var(--accent); transition:transform .2s; flex-shrink:0; }
    [data-theme="light"] .theme-btn::after { transform:translateX(16px); }
    .theme-icon { font-size:.8rem; position:absolute; }
    .theme-icon.moon { left:3px; } .theme-icon.sun { right:3px; }

    /* ── Tabs ───────────────────────────────────────────────────────────── */
    .tab-bar { background:var(--surface); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; scrollbar-width:none; position:sticky; top:52px; z-index:99; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { padding:.75rem 1.25rem; background:none; border:none; color:var(--text2); font-size:.875rem; font-weight:500; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; transition:color .15s,border-color .15s; }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    /* ── Main ───────────────────────────────────────────────────────────── */
    main { padding:1rem; max-width:960px; margin:0 auto; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* ── Country grid ───────────────────────────────────────────────────── */
    .country-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:.75rem; }
    .country-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1rem; text-align:center; cursor:pointer; transition:border-color .15s,background .15s,box-shadow .15s; }
    .country-card:hover { border-color:var(--accent); background:var(--surface2); box-shadow:0 2px 8px var(--shadow); }
    .country-card .flag { font-size:2rem; margin-bottom:.4rem; }
    .country-card .name { font-size:.85rem; font-weight:600; }
    .country-card .soon { font-size:.65rem; color:var(--text2); margin-top:.3rem; }

    /* ── Country detail ─────────────────────────────────────────────────── */
    .back-btn { display:inline-flex; align-items:center; gap:.4rem; background:none; border:none; color:var(--text2); font-size:.875rem; cursor:pointer; margin-bottom:1rem; padding:.25rem 0; }
    .back-btn:hover { color:var(--accent); }
    .section-title { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--text2); margin:1.5rem 0 .5rem; padding-bottom:.4rem; border-bottom:1px solid var(--border); }
    .report-list { display:flex; flex-direction:column; gap:.5rem; }
    .report-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:.875rem 1rem; display:flex; align-items:center; justify-content:space-between; text-decoration:none; transition:border-color .15s,background .15s; }
    .report-card:hover { border-color:var(--accent); background:var(--surface2); }
    .report-info { flex:1; min-width:0; }
    .report-name { font-size:.9rem; font-weight:600; color:var(--text); }
    .report-meta { font-size:.73rem; color:var(--text2); margin-top:.2rem; }
    .report-arrow { color:var(--accent); font-size:1rem; margin-left:.75rem; }
    .empty-section { color:var(--text2); font-size:.83rem; padding:.4rem 0; }

    /* ── BCs ────────────────────────────────────────────────────────────── */
    .bc-list { display:flex; flex-direction:column; gap:.5rem; }
    .bc-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; display:flex; align-items:center; gap:1rem; }
    .bc-flag { font-size:1.5rem; flex-shrink:0; }
    .bc-info { flex:1; min-width:0; }
    .bc-name { font-size:.9rem; font-weight:600; }
    .bc-cycle { margin-top:.25rem; }
    .badge { display:inline-block; padding:.15rem .55rem; border-radius:99px; font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .badge-tightening { background:rgba(163,20,24,.15); color:var(--red); }
    .badge-easing     { background:rgba(131,165,64,.15); color:var(--green); }
    .badge-hold       { background:rgba(238,163,32,.15); color:var(--amber); }
    .bc-rate { font-size:.85rem; color:var(--text2); font-weight:700; flex-shrink:0; }

    /* ── PPTs ───────────────────────────────────────────────────────────── */
    .ppt-list { display:flex; flex-direction:column; gap:.5rem; }
    .ppt-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:.875rem 1rem; display:flex; align-items:center; gap:.75rem; text-decoration:none; transition:border-color .15s,background .15s; }
    .ppt-card:hover { border-color:var(--accent); background:var(--surface2); }
    .ppt-icon { font-size:1.5rem; flex-shrink:0; }
    .ppt-info { flex:1; min-width:0; }
    .ppt-title { font-size:.9rem; font-weight:600; color:var(--text); }
    .ppt-meta  { font-size:.73rem; color:var(--text2); margin-top:.2rem; }

    /* ── Misc ───────────────────────────────────────────────────────────── */
    .empty-state { text-align:center; padding:3rem 1rem; color:var(--text2); }
    .empty-state .icon { font-size:2.5rem; margin-bottom:.75rem; }
    .empty-state p { font-size:.875rem; }
    .page-header { margin-bottom:1.25rem; }
    .page-header h2 { font-size:1.1rem; font-weight:700; }
    .page-header p  { font-size:.8rem; color:var(--text2); margin-top:.25rem; }

    @media(min-width:600px) {
      main { padding:1.5rem; }
      .country-grid { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); }
    }
  </style>
</head>
<body>

<!-- ── Auth ── -->
<div id="auth-overlay">
  <div class="auth-box">
    <img class="auth-logo-img" src="assets/truxt_logo.jpg" alt="TRUXT" />
    <h2>Macro Research Portal</h2>
    <p>Acesso restrito. Digite a senha para continuar.</p>
    <form id="auth-form">
      <input type="password" id="auth-input" placeholder="Senha" autofocus autocomplete="current-password" />
      <button type="submit" class="btn-primary">Entrar</button>
    </form>
    <div id="auth-error">Senha incorreta. Tente novamente.</div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <header>
    <img class="header-logo" src="assets/truxt_logo.jpg" alt="TRUXT" />
    <div class="header-right">
      <span id="header-date"></span>
      <button class="theme-btn" id="theme-btn" aria-label="Alternar tema">
        <span class="theme-icon moon">🌙</span>
        <span class="theme-icon sun">☀️</span>
      </button>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="paises">Países</button>
    <button class="tab-btn" data-tab="bcs">BCs</button>
    <button class="tab-btn" data-tab="ppts">PPTs</button>
  </nav>

  <main>

    <!-- Países -->
    <div id="tab-paises" class="tab-panel active">
      <div id="country-list-view">
        <div class="page-header"><h2>Países</h2><p>Selecione um país para ver os relatórios</p></div>
        <div class="country-grid" id="country-grid"></div>
      </div>
      <div id="country-detail-view" style="display:none;">
        <button class="back-btn" id="back-btn">&#8592; Países</button>
        <div id="country-detail-content"></div>
      </div>
    </div>

    <!-- BCs -->
    <div id="tab-bcs" class="tab-panel">
      <div class="page-header"><h2>Bancos Centrais</h2><p>Taxas de referência e ciclos de política monetária</p></div>
      <div class="bc-list" id="bc-list"></div>
    </div>

    <!-- PPTs -->
    <div id="tab-ppts" class="tab-panel">
      <div class="page-header"><h2>Apresentações</h2><p>Decks e slides internos</p></div>
      <div class="ppt-list" id="ppt-list"></div>
    </div>

  </main>
</div>

<script src="auth.js"></script>
<script>
// ── Theme ──────────────────────────────────────────────────────────────────
(function(){
  document.documentElement.setAttribute("data-theme",
    localStorage.getItem("macro_theme") || "dark");
})();
document.getElementById("theme-btn").addEventListener("click", () => {
  const html = document.documentElement;
  const next = html.getAttribute("data-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("macro_theme", next);
});

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return "";
  const [y,m,d] = iso.split("-");
  const months = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${d} ${months[+m-1]} ${y}`;
}
function emptyState(msg) {
  return `<div class="empty-state"><div class="icon">📭</div><p>${msg}</p></div>`;
}

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab-btn").forEach(btn =>
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
  })
);
document.getElementById("header-date").textContent =
  new Date().toLocaleDateString("pt-BR", { day:"2-digit", month:"short", year:"numeric" });

// ── Config ─────────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const res = await fetch("config.json");
    if (!res.ok) throw new Error();
    return await res.json();
  } catch { return { countries:[], reports:[], centralBanks:[], presentations:[] }; }
}
function groupReports(reports) {
  const m = {};
  reports.forEach(r => { (m[r.country]??={})[r.section]??=[]; m[r.country][r.section].push(r); });
  return m;
}

// ── Static data ────────────────────────────────────────────────────────────
const COUNTRY_META = {
  brasil:      { name:"Brasil",       flag:"🇧🇷" },
  eua:         { name:"EUA",          flag:"🇺🇸" },
  zona_euro:   { name:"Zona do Euro", flag:"🇪🇺" },
  china:       { name:"China",        flag:"🇨🇳" },
  reino_unido: { name:"Reino Unido",  flag:"🇬🇧" },
  japao:       { name:"Japão",        flag:"🇯🇵" },
};
const SECTIONS       = ["atividade","inflacao","fiscal"];
const SECTION_LABELS = { atividade:"Atividade", inflacao:"Inflação", fiscal:"Fiscal" };
const CENTRAL_BANKS_STATIC = [
  { flag:"🇧🇷", name:"BCB — Banco Central do Brasil", cycle:"hold",       rate:"13,25%"     },
  { flag:"🇺🇸", name:"Fed — Federal Reserve",          cycle:"hold",       rate:"4,25–4,50%" },
  { flag:"🇪🇺", name:"BCE — Banco Central Europeu",    cycle:"easing",     rate:"2,40%"      },
  { flag:"🇬🇧", name:"BoE — Bank of England",          cycle:"easing",     rate:"4,25%"      },
  { flag:"🇯🇵", name:"BoJ — Bank of Japan",            cycle:"tightening", rate:"0,50%"      },
  { flag:"🇨🇳", name:"PBoC — People's Bank of China",  cycle:"easing",     rate:"3,10%"      },
];
const CYCLE_LABEL = { tightening:"Alta de juros", easing:"Corte de juros", hold:"Em espera" };
const CYCLE_BADGE = { tightening:"badge-tightening", easing:"badge-easing", hold:"badge-hold" };

// ── Países ─────────────────────────────────────────────────────────────────
function renderCountryGrid(countries, byCountry) {
  const grid = document.getElementById("country-grid");
  if (!countries.length) { grid.innerHTML = emptyState("Nenhum país cadastrado."); return; }
  grid.innerHTML = countries.map(c => {
    const m = COUNTRY_META[c] || { name:c, flag:"🌍" };
    return `<div class="country-card" data-country="${c}">
      <div class="flag">${m.flag}</div>
      <div class="name">${m.name}</div>
      ${!byCountry[c] ? `<div class="soon">Em breve</div>` : ""}
    </div>`;
  }).join("");
  grid.querySelectorAll(".country-card").forEach(card =>
    card.addEventListener("click", () => showCountryDetail(card.dataset.country, byCountry))
  );
}

function showCountryDetail(country, byCountry) {
  document.getElementById("country-list-view").style.display = "none";
  document.getElementById("country-detail-view").style.display = "block";
  const m = COUNTRY_META[country] || { name:country, flag:"🌍" };
  const sections = byCountry[country] || {};
  let html = `<div class="page-header"><h2>${m.flag} ${m.name}</h2></div>`;
  SECTIONS.forEach(sec => {
    html += `<div class="section-title">${SECTION_LABELS[sec]}</div>`;
    const reps = sections[sec] || [];
    html += reps.length
      ? `<div class="report-list">` + reps.map(r => `
          <a class="report-card" href="${r.file}" target="_blank" rel="noopener">
            <div class="report-info">
              <div class="report-name">${r.title}</div>
              <div class="report-meta">Atualizado em ${fmtDate(r.updated)}</div>
            </div>
            <span class="report-arrow">↗</span>
          </a>`).join("") + `</div>`
      : `<div class="empty-section">Nenhum relatório disponível.</div>`;
  });
  document.getElementById("country-detail-content").innerHTML = html;
}

document.getElementById("back-btn").addEventListener("click", () => {
  document.getElementById("country-detail-view").style.display = "none";
  document.getElementById("country-list-view").style.display = "block";
});

// ── BCs ────────────────────────────────────────────────────────────────────
function renderBCs(configBCs) {
  const list = document.getElementById("bc-list");
  const bcs  = configBCs?.length ? configBCs : CENTRAL_BANKS_STATIC;
  list.innerHTML = bcs.map(bc => `
    <div class="bc-card">
      <div class="bc-flag">${bc.flag||"🏦"}</div>
      <div class="bc-info">
        <div class="bc-name">${bc.name}</div>
        <div class="bc-cycle"><span class="badge ${CYCLE_BADGE[bc.cycle]||"badge-hold"}">${CYCLE_LABEL[bc.cycle]||bc.cycle}</span></div>
      </div>
      <div class="bc-rate">${bc.rate||""}</div>
    </div>`).join("");
}

// ── PPTs ───────────────────────────────────────────────────────────────────
function renderPPTs(presentations) {
  const list = document.getElementById("ppt-list");
  if (!presentations?.length) { list.innerHTML = emptyState("Nenhuma apresentação cadastrada ainda."); return; }
  list.innerHTML = presentations.map(p => `
    <a class="ppt-card" href="${p.file}" target="_blank" rel="noopener">
      <div class="ppt-icon">📑</div>
      <div class="ppt-info">
        <div class="ppt-title">${p.title}</div>
        <div class="ppt-meta">${fmtDate(p.date)}${p.description?" · "+p.description:""}</div>
      </div>
    </a>`).join("");
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function loadApp() {
  const config    = await loadConfig();
  const byCountry = groupReports(config.reports || []);
  const countries = config.countries || Object.keys(byCountry);
  renderCountryGrid(countries, byCountry);
  renderBCs(config.centralBanks);
  renderPPTs(config.presentations);
}
window.loadApp = loadApp;

async function bootstrap() { initAuth(); if (checkAuth()) await loadApp(); }
bootstrap();
</script>
</body>
</html>
